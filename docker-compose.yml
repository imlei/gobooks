# 遵循project_guide.md

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: gobooks
      POSTGRES_PASSWORD: gobooks
      POSTGRES_DB: gobooks
    ports:
      - "5432:5432"
    volumes:
      - gobooks_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gobooks -d gobooks"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build: .
    command: ["/app/gobooks-migrate"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: gobooks
      DB_PASSWORD: gobooks
      DB_NAME: gobooks
      DB_SSLMODE: disable

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: dev
      APP_ADDR: :6768
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: gobooks
      DB_PASSWORD: gobooks
      DB_NAME: gobooks
      DB_SSLMODE: disable
    ports:
      - "6768:6768"

volumes:
  gobooks_pgdata:
